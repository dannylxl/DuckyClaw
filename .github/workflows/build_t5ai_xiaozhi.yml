name: Build T5AI Firmware with Xiaozhi UI

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo apt-get clean
        df -h

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Init TuyaOpen submodules
      run: |
        # Initialize TuyaOpen submodules
        git submodule sync --recursive
        git submodule update --init --recursive
        # Initialize TuyaOpen's internal submodules
        cd TuyaOpen
        git submodule sync --recursive
        git submodule update --init --recursive

    - name: Clone T5AI Platform
      run: |
        cd TuyaOpen
        # Clone T5AI platform if not exists
        if [ ! -d "platform/T5AI" ]; then
          echo "Cloning T5AI platform..."
          mkdir -p platform
          git clone --depth 1 https://github.com/tuya/TuyaOpen-T5AI.git platform/T5AI
        fi
        # Clone or link tools
        if [ ! -d "platform/tools" ]; then
          mkdir -p platform/tools
        fi
        # Verify T5AI platform
        ls -la platform/
        if [ ! -f "platform/T5AI/t5_os/build.sh" ]; then
          echo "ERROR: T5AI platform build.sh not found!"
          exit 1
        fi
        echo "T5AI platform ready!"
        echo ""
        echo "Directory structure:"
        find platform -maxdepth 3 -type d | head -20

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git wget build-essential python3-venv
        pip install -r TuyaOpen/requirements.txt

    - name: Setup ARM Toolchain
      run: |
        cd TuyaOpen
        # Set up git safe directories
        git config --global --add safe.directory "$(pwd)/platform/T5AI"
        # Install ARM toolchain
        if [ ! -d "platform/tools/gcc-arm-none-eabi-10.3-2021.10" ]; then
          echo "Downloading ARM toolchain..."
          mkdir -p platform/tools
          wget -q https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu-rm/10.3-2021.10/gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2
          tar -xjf gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2 -C platform/tools/
          rm gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2
        fi
        echo "ARM toolchain ready"

    - name: Prepare config file
      run: |
        # Create cache directory and copy config
        mkdir -p .build/cache
        cp -f config/ATK_T5AI_MINI_BOARD_2.4LCD_CAMERA.config .build/cache/using.config
        cp -f .build/cache/using.config TuyaOpen/
        echo "Config file ready: ATK T5AI Mini Board with 2.4\" SPI LCD"
        cat .build/cache/using.config | grep -E "CONFIG_BOARD|CONFIG_ATK|CONFIG_ENABLE_AI" | head -10

    - name: Build Firmware
      run: |
        cd TuyaOpen/platform/T5AI/t5_os
        export TUYA_PROJECT_DIR="$(cd ../../../.. && pwd)"
        export TUYA_APP_NAME="DuckyClaw"
        export TUYA_APP_PATH="$TUYA_PROJECT_DIR"
        export TUYA_TOOLCHAIN_PATH="$TUYA_PROJECT_DIR/TuyaOpen/platform/tools/gcc-arm-none-eabi-10.3-2021.10"
        export PATH="$TUYA_TOOLCHAIN_PATH/bin:$PATH"

        # Create tuya_iot_config.h
        mkdir -p include/base/include
        cp "$TUYA_PROJECT_DIR/include/tuya_app_config.h" include/base/include/tuya_iot_config.h

        echo "Starting build..."
        bash build.sh DuckyClaw 1.0.0 bk7258 "$TUYA_PROJECT_DIR" build 2>&1 | tee build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "Build exit code: $BUILD_EXIT_CODE"
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "Build failed with exit code $BUILD_EXIT_CODE"
          exit 1
        fi
        echo "Build completed successfully"

    - name: Package Firmware
      if: always()
      run: |
        cd TuyaOpen/platform/T5AI/t5_os
        echo "Checking build outputs..."
        echo "=== Looking for .bin files ==="
        find build -name "*.bin" 2>/dev/null | head -20 || echo "No .bin files found"
        echo ""
        echo "=== Build directory structure ==="
        ls -la build/ 2>/dev/null || echo "No build directory"
        echo ""
        echo "=== tuya_app directory ==="
        ls -la build/bk7258/tuya_app/ 2>/dev/null || echo "No tuya_app directory"
        echo ""
        echo "=== package directory ==="
        ls -la build/bk7258/tuya_app/package/ 2>/dev/null || echo "No package directory"

        if [ -f "build/bk7258/tuya_app/package/ua_file.bin" ]; then
          cp build/bk7258/tuya_app/package/ua_file.bin "$GITHUB_WORKSPACE/DuckyClaw_Xiaozhi_UA.bin"
          cp build/bk7258/tuya_app/package/all-app.bin "$GITHUB_WORKSPACE/DuckyClaw_Xiaozhi_QIO.bin"
          echo "Firmware packaged successfully"
          ls -lh "$GITHUB_WORKSPACE/"*.bin
        else
          echo "Build artifacts not found"
          if [ -f build.log ]; then
            echo "=== Build Log (last 200 lines) ==="
            cat build.log | tail -200
          fi
          echo "=== Build Directory Structure ==="
          find build -type f \( -name "*.log" -o -name "*.cmake" \) 2>/dev/null | head -20
          exit 1
        fi

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: DuckyClaw_Xiaozhi_Firmware
        path: |
          DuckyClaw_Xiaozhi_UA.bin
          DuckyClaw_Xiaozhi_QIO.bin
          TuyaOpen/platform/T5AI/t5_os/build/bk7258/tuya_app/*/app.bin
          TuyaOpen/platform/T5AI/t5_os/build.log
        retention-days: 30
        if-no-files-found: error

    - name: Upload Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          DuckyClaw_Xiaozhi_UA.bin
          DuckyClaw_Xiaozhi_QIO.bin
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
